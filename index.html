<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrell Anderson — WordPress Developer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
–bg: #0f1117;
–surface: #181c27;
–surface-hover: #1e2235;
–border: #2a2f45;
–accent: #00e5a0;
–accent-dim: rgba(0, 229, 160, 0.1);
–text: #f0f0f8;
–body: #c8cad8;
–muted: #9aa0b8;
–tag-bg: #1e2235;
–tag-text: #a8afc8;
}
html { scroll-behavior: smooth; }
body {
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
line-height: 1.6;
overflow-x: hidden;
}

nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
padding: 1.25rem 2rem;
display: flex;
justify-content: space-between;
align-items: center;
background: rgba(15,17,23,0.92);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
}
.nav-logo {
font-family: ‘DM Mono’, monospace;
font-size: 0.85rem;
color: var(–accent);
letter-spacing: 0.05em;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
color: var(–muted);
text-decoration: none;
letter-spacing: 0.06em;
transition: color 0.2s;
}
.nav-links a:hover { color: var(–accent); }
.hero {
min-height: 100vh;
display: flex;
align-items: center;
padding: 8rem 2rem 4rem;
max-width: 1100px;
margin: 0 auto;
}
.hero-inner { max-width: 780px; }
.hero-eyebrow {
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
color: var(–accent);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-bottom: 1.5rem;
opacity: 0;
animation: fadeUp 0.6s 0.1s forwards;
}
.hero h1 {
font-size: clamp(2.8rem, 7vw, 5.5rem);
font-weight: 800;
line-height: 1.05;
letter-spacing: -0.02em;
color: var(–text);
margin-bottom: 1.5rem;
opacity: 0;
animation: fadeUp 0.6s 0.2s forwards;
}
.hero h1 span { color: var(–accent); display: block; }
.hero-desc {
font-size: 1.1rem;
color: var(–body);
max-width: 560px;
line-height: 1.8;
margin-bottom: 2.5rem;
opacity: 0;
animation: fadeUp 0.6s 0.35s forwards;
}
.hero-stats {
display: flex;
gap: 2.5rem;
flex-wrap: wrap;
margin-bottom: 3rem;
opacity: 0;
animation: fadeUp 0.6s 0.45s forwards;
}
.stat { display: flex; flex-direction: column; gap: 0.2rem; }
.stat-num { font-size: 2rem; font-weight: 800; color: var(–accent); line-height: 1; }
.stat-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
color: var(–muted);
letter-spacing: 0.08em;
text-transform: uppercase;
}
.hero-cta {
display: flex; gap: 1rem; flex-wrap: wrap;
opacity: 0; animation: fadeUp 0.6s 0.55s forwards;
}
.btn {
display: inline-flex; align-items: center; gap: 0.5rem;
padding: 0.85rem 1.75rem; border-radius: 4px;
font-family: ‘DM Mono’, monospace; font-size: 0.82rem;
letter-spacing: 0.05em; text-decoration: none; transition: all 0.2s;
}
.btn-primary { background: var(–accent); color: #0a0a0f; font-weight: 500; border: none; }
.btn-primary:hover { background: #00ffb3; transform: translateY(-1px); }
.btn-secondary { background: transparent; color: var(–body); border: 1px solid var(–border); }
.btn-secondary:hover { border-color: var(–accent); color: var(–accent); }
section { max-width: 1100px; margin: 0 auto; padding: 5rem 2rem; }
.section-header {
display: flex; align-items: center; gap: 1.5rem; margin-bottom: 3.5rem;
}
.section-num {
font-family: ‘DM Mono’, monospace; font-size: 0.72rem;
color: var(–accent); letter-spacing: 0.1em; white-space: nowrap;
}
.section-title {
font-size: 2rem; font-weight: 700;
letter-spacing: -0.01em; color: var(–text); white-space: nowrap;
}
.section-line { flex: 1; height: 1px; background: var(–border); }
.skills-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 1px; background: var(–border);
border: 1px solid var(–border); border-radius: 8px; overflow: hidden;
}
.skill-card { background: var(–surface); padding: 1.75rem; transition: background 0.2s; }
.skill-card:hover { background: var(–surface-hover); }
.skill-icon { font-size: 1.4rem; margin-bottom: 0.75rem; }
.skill-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.6rem; color: var(–text); }
.skill-items { font-family: ‘DM Mono’, monospace; font-size: 0.75rem; color: var(–body); line-height: 2; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
.project-card {
background: var(–surface); border: 1px solid var(–border); border-radius: 8px;
overflow: hidden; transition: transform 0.25s, border-color 0.25s, background 0.25s;
display: flex; flex-direction: column; text-decoration: none; color: inherit;
}
.project-card:hover { transform: translateY(-4px); border-color: var(–accent); background: var(–surface-hover); }
.project-header { padding: 1.5rem 1.5rem 0; display: flex; justify-content: space-between; align-items: flex-start; }
.project-industry {
font-family: ‘DM Mono’, monospace; font-size: 0.67rem;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(–accent); background: var(–accent-dim);
padding: 0.3rem 0.6rem; border-radius: 3px;
}
.project-arrow { color: var(–muted); font-size: 1.1rem; transition: color 0.2s, transform 0.2s; }
.project-card:hover .project-arrow { color: var(–accent); transform: translate(2px, -2px); }
.project-body { padding: 1.25rem 1.5rem 1.5rem; flex: 1; display: flex; flex-direction: column; }
.project-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; letter-spacing: -0.01em; color: var(–text); }
.project-desc { font-size: 0.9rem; color: var(–body); line-height: 1.75; flex: 1; margin-bottom: 1.25rem; }
.project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.tag {
font-family: ‘DM Mono’, monospace; font-size: 0.67rem;ackground: var(–tag-bg); color: var(–tag-text);
padding: 0.28rem 0.55rem; border-radius: 3px; letter-spacing: 0.04em;
}
.project-card.wip { border-style: dashed; }
.project-card.wip .project-industry { color: #f0a500; background: rgba(240,165,0,0.1); }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
@media (max-width: 700px) { .about-grid { grid-template-columns: 1fr; gap: 2rem; } }
.about-text { font-size: 1rem; color: var(–body); line-height: 1.85; }
.about-text p + p { margin-top: 1.25rem; }
.about-text strong { color: var(–text); }
.about-details { display: flex; flex-direction: column; }
detail-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(–border); gap: 1rem; }
